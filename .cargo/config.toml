# Cargo configuration for ralph-workflow project

# Integration tests now support parallel execution. Each test uses its own
# working directory passed via the `working_dir` parameter to `run_ralph_cli()`,
# avoiding global CWD changes and mutex contention.
#
# Tests can run with default parallel execution:
#   cargo test -p ralph-workflow-tests

[build]
# Use default build settings.
#
# When `cargo dylint ...` runs, it sets `RUSTUP_TOOLCHAIN` and compiles workspace
# crates with a nightly driver, but dependencies may still be built with the
# user's default `rustc`. That can lead to:
#   "found crate ... compiled by an incompatible version of rustc"
#
# This wrapper only activates for Dylint builds and forces dependency builds to
# use the same toolchain.
rustc-wrapper = "./.cargo/rustc-wrapper-dylint"
