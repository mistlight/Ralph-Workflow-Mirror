<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7da58a;stop-opacity:1" />
    </linearGradient>
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0d1f18"/>

  <!-- Outer frame -->
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="url(#logoGradient)" stroke-width="3"/>

  <!-- Letter R -->
  <path d="M 50 50 L 50 150 L 110 150 L 110 110 L 80 110 L 80 50 Z" fill="url(#logoGradient)" filter="url(#logoGlow)"/>

  <!-- Agent dots representing multi-agent system -->
  <circle cx="130" cy="70" r="8" fill="#d4a574">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="100" r="8" fill="#5d9e73">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="130" cy="130" r="8" fill="#7da58a">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <!-- Connection lines between agents -->
  <line x1="130" y1="70" x2="150" y2="100" stroke="#d4a574" stroke-width="1.5" opacity="0.6"/>
  <line x1="150" y1="100" x2="130" y2="130" stroke="#d4a574" stroke-width="1.5" opacity="0.6"/>
</svg>
