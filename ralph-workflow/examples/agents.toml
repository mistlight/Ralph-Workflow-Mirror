# Ralph Agents Configuration File
# ================================
#
# This file configures AI coding agents for the Ralph orchestrator.
# Ralph uses a "developer" agent to implement code and a "reviewer" agent
# to review and improve the code quality.
#
# QUICK START
# -----------
# If you copied this file from `examples/agents.toml` to `.agent/agents.toml`,
# you can customize it for your project. Otherwise, Ralph uses built-in defaults.
#
# USAGE
# -----
# Select agents via CLI:
#   ralph --developer-agent claude --reviewer-agent codex
#
# Or via environment variables:
#   RALPH_DEVELOPER_AGENT=claude RALPH_REVIEWER_AGENT=codex ralph
#
# Or use presets:
#   ralph --preset opencode  # Uses opencode for both roles
#
# AGENT CONFIGURATION FIELDS
# --------------------------
# cmd          - Base command to invoke the agent (required)
# output_flag  - Output-format flag (JSON streaming, text mode, etc.; optional)
# yolo_flag    - Flag for autonomous mode (no prompts, optional)
# verbose_flag - Flag for verbose output (optional)
# can_commit   - Whether agent can make repo changes via tools (default: true)
# json_parser  - Output parser: "claude", "codex", or "generic" (default: "generic")
# model_flag   - Model/provider selection flag (e.g., "-m provider/model"; optional)
#                Used by agents that support multiple providers like opencode
# display_name - Human-readable name for UI/logging (e.g., "My Custom Agent"; optional)
#                Defaults to agent name if not specified
#
# JSON PARSERS
# ------------
# - "claude"   : Parses Claude Code's stream-json format
# - "codex"    : Parses OpenAI Codex CLI JSON format
# - "gemini"   : Parses Google Gemini CLI JSON format
# - "opencode" : Parses OpenCode's NDJSON format (step_start, step_finish, tool_use, text)
# - "generic"  : Line-by-line output (no JSON parsing)
#
# AGENT CHAIN CONFIGURATION
# -------------------------
# Define preferred agents and automatic fallback switching.
#
# The agent chain serves two purposes:
# 1. **Preferred agent**: The first agent in the list is the primary choice
# 2. **Fallback agents**: Remaining agents are tried in order if the preferred fails
#
# Configure defaults and fallback ordering via `[agent_chain]`.
#
# [agent_chain]
# developer = ["claude", "codex", "opencode"]  # claude is preferred, others are fallbacks
# reviewer = ["codex", "claude"]               # codex is preferred for reviews
# max_retries = 3                              # Retries per agent before trying next
# retry_delay_ms = 1000                        # Delay between retries (ms)
#
# PROVIDER-LEVEL FALLBACK
# -----------------------
# For agents that support multiple providers (like opencode), you can configure
# provider-level fallback. Ralph will try different models within the same agent
# before switching to the next agent in the chain.
#
# provider_fallback.opencode = ["-m opencode/glm-4.7-free", "-m opencode/claude-sonnet-4"]
#
# This allows you to utilize free or cheaper models as primary, with premium
# models as backup when hitting rate limits or token exhaustion.
#
# The first agent in each list is the primary choice for that role.
# Ralph automatically switches to fallback agents on:
#   - Rate limits (429 errors)
#   - Authentication failures
#   - Token/context exhaustion
#   - Command not found

# =============================================================================
# BUILT-IN AGENTS (defaults shown - uncomment to override)
# =============================================================================

# Claude Code - Anthropic's AI coding assistant
# https://claude.ai/code
[agents.claude]
cmd = "claude -p"
output_flag = "--output-format=stream-json"
yolo_flag = "--dangerously-skip-permissions"
verbose_flag = "--verbose"
can_commit = true
json_parser = "claude"
display_name = "Claude Code"

# CCS (Claude Code Switch) - Universal AI profile manager
# https://github.com/kaitranntt/ccs
# CCS wraps Claude Code and provides multi-profile/multi-provider support.
# Use CCS aliases like "ccs/work", "ccs/personal", "ccs/gemini" for different profiles.
# Configure aliases in ~/.config/ralph-workflow.toml under [ccs_aliases].
# Note: CCS uses Claude's stream-json format since it wraps Claude Code.
[agents.ccs]
cmd = "ccs"
output_flag = "--output-format=stream-json"
yolo_flag = "--dangerously-skip-permissions"
verbose_flag = "--verbose"
can_commit = true
json_parser = "ccs"
display_name = "CCS (Claude Code Switch)"
print_flag = "-p"  # Required for non-interactive mode (Claude CLI requirement)

# GLM-Direct - GLM via Claude CLI with CCS environment variables
# This agent bypasses the CCS wrapper to get proper stream-json output.
# It calls Claude CLI directly with GLM environment variables loaded from CCS settings.
# This works around CCS's headless delegation formatting that interferes with stream-json.
#
# Optional: If you have a GLM profile configured in CCS (run: `ccs api create --preset glm`),
# you can enable CCS env var loading by setting `ccs_profile = "glm"`.
[agents.glm-direct]
cmd = "claude"
output_flag = "--output-format=stream-json"
yolo_flag = "--dangerously-skip-permissions"
verbose_flag = "--verbose"
can_commit = true
json_parser = "claude"
print_flag = "-p"  # Required for non-interactive mode
display_name = "GLM (Direct via Claude)"

# OpenAI Codex CLI
# https://github.com/openai/codex
# Uses --full-auto for automatic sandboxed execution
[agents.codex]
cmd = "codex exec"
output_flag = "--json"
yolo_flag = "--full-auto"
verbose_flag = ""
can_commit = true
json_parser = "codex"
display_name = "OpenAI Codex CLI"

# OpenCode - Open source AI coding tool
# https://github.com/opencode-ai/opencode
# Uses 'run' command for non-interactive, --format json for raw JSON events output
# Supports multiple providers via -m flag (e.g., -m opencode/glm-4.7-free)
[agents.opencode]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
display_name = "OpenCode"
# model_flag = "-m opencode/glm-4.7-free"  # Uncomment to set default model

# Aider - AI pair programming in your terminal
# https://github.com/paul-gauthier/aider
# Uses --message for single-message mode, --yes-always for auto-confirm
[agents.aider]
cmd = "aider --message"
output_flag = ""
yolo_flag = "--yes-always"
verbose_flag = "--verbose"
can_commit = true
json_parser = "generic"
display_name = "Aider"

# Goose - Block's open-source AI agent
# https://github.com/block/goose
# Uses run command with -t for text input, --output-format for JSON streaming
# Note: yolo_flag intentionally empty - goose is designed as an interactive,
# session-based agent and doesn't support unattended auto-approval mode.
# The --no-session flag only skips session file storage, not tool approval prompts.
# For unattended automation, consider using other agents with explicit yolo support.
[agents.goose]
cmd = "goose run -t"
output_flag = "--output-format=stream-json"
yolo_flag = ""
verbose_flag = "--debug"
can_commit = true
json_parser = "generic"
display_name = "Goose (Block)"

# Cline - Autonomous coding agent
# https://github.com/cline/cline
# Uses -F json for JSON output, -y for autonomous mode
[agents.cline]
cmd = "cline -o"
output_flag = "-F json"
yolo_flag = "-y"
verbose_flag = "-v"
can_commit = true
json_parser = "generic"
display_name = "Cline"

# Continue.dev CLI (cn)
# https://docs.continue.dev/guides/cli
# Uses -p for headless mode, --format json for JSON output
[agents.continue]
cmd = "cn -p"
output_flag = "--format json"
yolo_flag = "--auto"
verbose_flag = "--verbose"
can_commit = true
json_parser = "generic"
display_name = "Continue.dev"

# Amazon Q Developer CLI
# https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/command-line.html
# Uses --no-interactive for non-interactive mode
[agents.amazon-q]
cmd = "q chat --no-interactive"
output_flag = ""
yolo_flag = "--trust-all-tools"
verbose_flag = ""
can_commit = true
json_parser = "generic"
display_name = "Amazon Q Developer"

# Gemini CLI
# https://github.com/google-gemini/gemini-cli
# Positional argument for prompt, -o/--output-format for output format
# -y/--yolo for auto-approve all actions
[agents.gemini]
cmd = "gemini"
output_flag = "-o stream-json"
yolo_flag = "-y"
verbose_flag = "-d"
can_commit = true
json_parser = "gemini"
display_name = "Google Gemini CLI"

# =============================================================================
# LOWER-COST / OPEN-SOURCE AGENTS
# =============================================================================

# Qwen Code - Alibaba's open-source CLI coding agent (Qwen3-Coder)
# https://github.com/QwenLM/qwen-code
# Uses -p for non-interactive prompt mode, --output-format stream-json for JSON streaming
# --yolo for auto-approve all tool calls
# Note: Forked from Gemini CLI, output format compatible with Claude's stream-json
[agents.qwen]
cmd = "qwen -p"
output_flag = "--output-format stream-json"
yolo_flag = "--yolo"
verbose_flag = "--debug"
can_commit = true
json_parser = "claude"
display_name = "Qwen Code"

# Mistral Vibe - Mistral AI's CLI coding assistant (Devstral)
# https://github.com/mistralai/mistral-vibe
# https://docs.mistral.ai/mistral-vibe/introduction
# Uses --prompt <text> for non-interactive mode, --auto-approve for autonomous execution
# Note: No JSON streaming output format, uses generic line-based parsing
# Note: If you meant Mistral's API/SDK tooling (not mistral-vibe), add a separate agent.
[agents.vibe]
cmd = "vibe --prompt"
output_flag = ""
yolo_flag = "--auto-approve"
verbose_flag = ""
can_commit = true
json_parser = "generic"
display_name = "Mistral Vibe"

# llama.cpp CLI - Local LLM inference with llama-cli
# https://github.com/ggml-org/llama.cpp
# Uses -m for local model path, -cnv for conversation mode
# Note: Requires local model setup, no native JSON streaming, uses generic parsing.
# Not included in the default agent_chain because local models can be heavy to install/run.
# CHAT-ONLY AGENT: yolo_flag is intentionally empty. This is a simple chat tool without
# agentic tool use capabilities. It doesn't have autonomous mode or file operations.
[agents.llama-cli]
cmd = "llama-cli -m /path/to/model.gguf -cnv -p"
output_flag = ""
yolo_flag = ""
verbose_flag = "-v"
can_commit = false
json_parser = "generic"
display_name = "llama.cpp CLI"

# AIChat - Multi-provider LLM CLI tool (OpenAI, Claude, Gemini, Ollama, etc.)
# https://github.com/sigoden/aichat
# Supports 20+ LLM providers through unified interface
# Uses -S to disable streaming for scripting, -e for shell command execution
# CHAT-ONLY AGENT: yolo_flag is intentionally empty. This is primarily a chat interface
# with limited tool use. While it supports shell execution via -e, it lacks comprehensive
# agentic capabilities like autonomous file operations.
[agents.aichat]
cmd = "aichat"
output_flag = ""
yolo_flag = ""
verbose_flag = ""
can_commit = false
json_parser = "generic"
display_name = "AIChat"

# Cursor CLI - Cursor's terminal-based AI coding agent
# https://cursor.com/docs/cli/overview
# Uses 'agent' command with -p for print/non-interactive mode, -f for force-allow commands
# Supports GPT-5, Claude, and other frontier models
# Note: The -p flag enables non-interactive mode (for scripts/automation), and -f forces
# command execution unless explicitly denied, enabling autonomous operation.
[agents.cursor]
cmd = "cursor agent -p -f"
output_flag = "--output-format text"
yolo_flag = ""
verbose_flag = ""
can_commit = true
json_parser = "generic"
display_name = "Cursor CLI"

# Plandex - Terminal-based AI for large codebases
# https://github.com/plandex-ai/plandex
# Handles up to 2M tokens of context, tree-sitter project maps
# Uses --apply for auto-apply, --commit for auto-commit
[agents.plandex]
cmd = "plandex tell"
output_flag = ""
yolo_flag = "--apply --commit"
verbose_flag = ""
can_commit = true
json_parser = "generic"
display_name = "Plandex"

# Ollama - Local LLM server with CLI
# https://github.com/ollama/ollama
# Run local models like Llama, Mistral, CodeLlama
# CHAT-ONLY AGENT: yolo_flag is intentionally empty. This is a general-purpose chat
# interface for running local models. It lacks agentic tool use capabilities like
# autonomous file operations. Suitable for simple Q&A and chat tasks.
[agents.ollama]
cmd = "ollama run codellama"
output_flag = ""
yolo_flag = ""
verbose_flag = ""
can_commit = false
json_parser = "generic"
display_name = "Ollama"

# =============================================================================
# AGENT CHAIN CONFIGURATION (required)
# =============================================================================
# The agent chain defines the preferred agent (first in list) and fallback
# agents (rest of the list). This section is required for Ralph to run.
#
# Ralph automatically switches to fallback agents on certain failures
# (rate limits, auth issues, token exhaustion, command not found).

[agent_chain]
developer = [
  "claude",
  "codex",
  "cursor",
  "qwen",
  "vibe",
  "plandex",
  "opencode",
  "aider",
  "goose",
  "cline",
  "continue",
  "amazon-q",
  "gemini",
]
reviewer = [
  "codex",
  "claude",
  "cursor",
  "qwen",
  "vibe",
  "plandex",
  "opencode",
  "aider",
  "goose",
  "cline",
  "continue",
  "amazon-q",
  "gemini",
]
commit = [
  "claude",
  "codex",
  "cursor",
  "qwen",
  "vibe",
  "plandex",
  "opencode",
  "aider",
  "goose",
  "cline",
  "continue",
  "amazon-q",
  "gemini",
]
max_retries = 3
retry_delay_ms = 1000

# Provider-level fallback: try different models within the same agent
# before switching to the next agent. Useful for opencode with multiple providers.
# provider_fallback.opencode = ["-m opencode/glm-4.7-free", "-m opencode/claude-sonnet-4"]

# =============================================================================
# OPENCODE PROVIDER TYPES EXPLAINED
# =============================================================================
# OpenCode supports multiple provider backends via the -m flag format:
#
# PROVIDER TYPE 1: OpenCode Zen Routing (opencode/*)
#   - Uses OpenCode's intelligent model routing gateway
#   - Requires OpenCode Zen account (opencode auth login -> select "OpenCode Zen")
#   - Examples: opencode/glm-4.7-free, opencode/claude-sonnet-4
#   - Benefits: Curated models, unified billing through OpenCode, free tier available
#
# PROVIDER TYPE 2: Z.AI Direct Access (zai/* or zhipuai/*)
#   - Connects directly to Z.AI's API (api.z.ai)
#   - Requires Z.AI API key (opencode auth login -> select "Z.AI")
#   - Examples: zai/glm-4.7, zai/glm-4.5, zhipuai/glm-4.7
#   - Note: Both "zai" and "zhipuai" prefixes are supported for Z.AI
#   - Benefits: Direct access to Z.AI's GLM models
#
# PROVIDER TYPE 2b: Z.AI Coding Plan (auth tier)
#   - Same Z.AI API endpoint, but with the Coding Plan subscription tier
#   - Requires Z.AI Coding Plan (opencode auth login -> select "Z.AI Coding Plan")
#   - Model prefix remains: zai/* (OpenCode expects provider/model)
#   - Examples: zai/glm-4.7, zai/glm-4.5
#   - Benefits: 3x usage at 1/7 the cost compared to standard Z.AI
#
# PROVIDER TYPE 3: Direct API Access ({provider}/*)
#   - Connects directly to provider's API (Anthropic, OpenAI, etc.)
#   - Requires your own API key configured via opencode auth
#   - Examples: anthropic/claude-sonnet-4, openai/gpt-5
#   - Benefits: Use existing API credits, no OpenCode/Z.AI dependency
#
# IMPORTANT:
#   - opencode/* routes through OpenCode's gateway (Zen)
#   - zai/* or zhipuai/* connects directly to Z.AI's API (standard tier)
#   - Z.AI Coding Plan is a separate subscription tier selected during auth (model prefix stays zai/*)
#   - These require different authentication selections in `opencode auth login`
#
# CHOOSING A PROVIDER - Decision Flowchart:
#   Q: Do you want free tier access via OpenCode?
#      YES -> Use opencode/glm-4.7-free (OpenCode Zen)
#      NO  -> Continue...
#   Q: Do you have a Z.AI Coding Plan subscription? (3x usage, 1/7 cost)
#      YES -> Use zai/* (and select "Z.AI Coding Plan" during auth)
#      NO  -> Continue...
#   Q: Do you have a standard Z.AI API key?
#      YES -> Use zai/* (Z.AI Direct)
#      NO  -> Continue...
#   Q: Do you already have Anthropic/OpenAI API keys?
#      YES -> Use anthropic/* or openai/* (Direct API)
#      NO  -> Use opencode/* (OpenCode Zen)
#   Q: Do you want unified billing through OpenCode?
#      YES -> Use opencode/* (OpenCode Zen)
#      NO  -> Use zai/*, anthropic/* or openai/* (Direct access)
#
# TL;DR:
#   - Use opencode/* for OpenCode Zen routing and unified billing
#   - Use zai/* for direct Z.AI API access (standard tier)
#   - Z.AI Coding Plan is selected during auth; model prefix stays zai/*
#   - Use anthropic/* or openai/* if you have your own provider API keys
#   - Provider fallback can mix all: try free Zen first, then Z.AI Coding Plan, then direct API

# =============================================================================
# OPENCODE MULTI-CONFIGURATION EXAMPLES (Agent Aliases)
# =============================================================================
# OpenCode supports multiple providers via the -m flag. You can create separate
# agent entries ("aliases") for different OpenCode configurations, allowing you
# to use them as distinct fallback entries in your agent chain.
#
# This is different from provider_fallback, which tries different models within
# a single agent run. Agent aliases give you full control over each configuration.
#
# COMPARISON OF FALLBACK MECHANISMS:
# ----------------------------------
# 1. Agent-level fallback (agent_chain):
#    - Different agents tried in sequence: ["opencode", "claude", "codex"]
#    - Each agent is a completely different tool
#
# 2. Provider-level fallback (provider_fallback.opencode):
#    - Different models tried within ONE opencode run
#    - Example: try GLM free tier, then Claude Sonnet if rate limited
#    - Configured as: provider_fallback.opencode = ["-m opencode/glm-4.7-free", "-m opencode/claude-sonnet-4"]
#
# 3. Agent aliases (shown below):
#    - Multiple opencode entries with DIFFERENT names
#    - Each can have different model_flag, output_flag, etc.
#    - Used in agent_chain as distinct fallback entries
#    - Gives maximum control over configuration per entry

# -------------------------------------------------------------------------
# OPENCODE ZEN PROVIDER ALIASES (routed through OpenCode's gateway)
# -------------------------------------------------------------------------
# These use the "opencode/*" model prefix which routes through OpenCode's
# Zen gateway service. Requires OpenCode Zen account (opencode auth login
# -> select "OpenCode Zen").

# OpenCode with GLM via Zen (free tier, lowest cost, try first)
# Uses: opencode/glm-4.7-free - routed through OpenCode Zen
[agents.opencode-zen-glm]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m opencode/glm-4.7-free"
display_name = "OpenCode with GLM (Zen)"

# OpenCode with Claude via Zen (premium, routed through OpenCode Zen billing)
# Uses: opencode/claude-sonnet-4 - Claude via OpenCode Zen routing
[agents.opencode-zen-claude]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m opencode/claude-sonnet-4"
display_name = "OpenCode with Claude (Zen)"

# OpenCode with Zen default routing (intelligent model selection)
# Note: Zen mode refers to OpenCode's default intelligent routing,
# which automatically selects the best model for the task
[agents.opencode-zen]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
display_name = "OpenCode with Zen (Auto)"
# No model_flag - uses opencode's default model selection

# -------------------------------------------------------------------------
# Z.AI DIRECT PROVIDER ALIASES (connects directly to Z.AI API)
# -------------------------------------------------------------------------
# These use the "zai/*" model prefix which connects directly to Z.AI's API.
# Note: "zhipuai/*" is also supported as an alternative prefix for Z.AI.
# Requires Z.AI API key configured in OpenCode via `opencode auth login` and
# selecting "Z.AI" or "Z.AI Coding Plan".
#
# NOTE: This is DIFFERENT from OpenCode Zen (opencode/*) which routes through
# OpenCode's gateway. Z.AI Direct connects to api.z.ai endpoints.

# OpenCode with Z.AI GLM Direct (Z.AI's flagship coding model)
# Uses: zai/glm-4.7 - direct connection to Z.AI API
[agents.opencode-zai-glm]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m zai/glm-4.7"
display_name = "OpenCode with Z.AI GLM"

# OpenCode with Z.AI GLM-4.5 Direct (alternative tier)
# Uses: zai/glm-4.5 - direct connection to Z.AI API
[agents.opencode-zai-glm45]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m zai/glm-4.5"
display_name = "OpenCode with Z.AI GLM-4.5"

# -------------------------------------------------------------------------
# Z.AI CODING PLAN PROVIDER ALIASES (Z.AI's Coding Plan subscription tier)
# -------------------------------------------------------------------------
# These use the same Z.AI API but with the Coding Plan subscription,
# offering 3x usage at 1/7 the cost. Requires Z.AI Coding Plan subscription.
# Run `opencode auth login` and select "Z.AI Coding Plan" to authenticate.
#
# NOTE: This is a SEPARATE subscription tier from regular Z.AI Direct!
# The model prefix remains zai/*; the tier is selected during `opencode auth login`.

# OpenCode with Z.AI GLM Coding Plan (3x usage, 1/7 cost)
# Uses: zai/glm-4.7 - Z.AI API with Coding Plan pricing (auth selection)
[agents.opencode-zai-glm-codingplan]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m zai/glm-4.7"
display_name = "OpenCode with Z.AI GLM (Coding Plan)"

# OpenCode with Z.AI GLM-4.5 Coding Plan (3x usage, 1/7 cost)
# Uses: zai/glm-4.5 - Z.AI API with Coding Plan pricing (auth selection)
[agents.opencode-zai-glm45-codingplan]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m zai/glm-4.5"
display_name = "OpenCode with Z.AI GLM-4.5 (Coding Plan)"

# -------------------------------------------------------------------------
# DIRECT API PROVIDER ALIASES (uses your own API keys)
# -------------------------------------------------------------------------
# These use provider-specific prefixes (anthropic/*, openai/*) which
# connect directly to the provider's API. Requires your own API key
# configured via: opencode auth <provider>

# OpenCode with direct Anthropic API (requires ANTHROPIC_API_KEY)
# Uses: anthropic/claude-sonnet-4 - direct API call, your billing
[agents.opencode-direct-claude]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m anthropic/claude-sonnet-4"
display_name = "OpenCode with Anthropic (Direct)"

# OpenCode with direct OpenAI API (requires OPENAI_API_KEY)
# Uses: openai/gpt-4o - direct API call, your billing
[agents.opencode-openai]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m openai/gpt-4o"
display_name = "OpenCode with OpenAI (Direct)"

# -------------------------------------------------------------------------
# GOOGLE PROVIDER ALIASES (Google AI Studio & Vertex AI)
# -------------------------------------------------------------------------
# Google AI Studio uses the "google/*" prefix with GOOGLE_GENERATIVE_AI_API_KEY
# Google Vertex AI uses "google-vertex/*" and requires GCP project setup

# OpenCode with Google AI Studio (requires GOOGLE_GENERATIVE_AI_API_KEY)
# Uses: google/gemini-2.0-flash - Google's fastest Gemini model
[agents.opencode-google]
cmd = "opencode run"
output_flag = "--format json"
yolo_flag = "--auto-approve"
verbose_flag = "--log-level DEBUG --print-logs"
can_commit = true
json_parser = "opencode"
model_flag = "-m google/gemini-2.0-flash"
display_name = "OpenCode with Google"

# OpenCode with Google Gemini Pro (requires GOOGLE_GENERATIVE_AI_API_KEY)
# Uses: google/gemini-1.5-pro - Google's most capable Gemini model
