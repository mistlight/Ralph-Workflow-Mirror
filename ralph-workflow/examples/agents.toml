# [agent_chain]
# developer = ["opencode-zen-glm", "opencode-direct-claude", "claude"]
# reviewer = ["opencode-zen-claude", "opencode-direct-claude"]
#
# Example 4: Z.AI Direct only (all requests go directly to Z.AI)
# [agent_chain]
# developer = ["opencode-zai-glm", "opencode-zen-glm", "claude"]
# reviewer = ["opencode-zai-glm", "claude"]
#
# Example 5: Full fallback chain (Z.AI Direct -> Zen -> Direct API)
# [agent_chain]
# developer = ["opencode-zai-glm", "opencode-zen-glm", "opencode-direct-claude"]
# reviewer = ["opencode-zai-glm", "opencode-zen-claude", "opencode-direct-claude"]

